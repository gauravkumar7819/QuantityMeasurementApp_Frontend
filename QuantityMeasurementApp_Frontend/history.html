<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnitMaster - Conversion History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- History Content -->
    <div class="history-container">
        <div class="history-header">
            <h1>📊 Conversion History</h1>
            <p>Track your measurement conversions over time</p>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalConversions">0</div>
                <div class="stat-label">Total Conversions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayConversions">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="weekConversions">0</div>
                <div class="stat-label">This Week</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="favoriteType">-</div>
                <div class="stat-label">Favorite Type</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="history-controls">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="length">Length</button>
                <button class="filter-btn" data-filter="weight">Weight</button>
                <button class="filter-btn" data-filter="temperature">Temperature</button>
                <button class="filter-btn" data-filter="volume">Volume</button>
                <button class="filter-btn" data-filter="area">Area</button>
                <button class="filter-btn" data-filter="time">Time</button>
            </div>
            <button class="clear-btn" onclick="clearHistory()">Clear History</button>
        </div>

        <!-- History List -->
        <div class="history-list" id="historyList">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <h3>No conversions yet</h3>
                <p>Start converting measurements to see your history here</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // History management
        let conversionHistory = [];
        let currentFilter = 'all';

        async function loadHistory() {
            const user = JSON.parse(localStorage.getItem('user'));
            const localHistory = JSON.parse(localStorage.getItem('conversionHistory') || '[]');
            
            if (user) {
                try {
                    const res = await fetch(`${API_MEASUREMENTS}?userId=${user.id}&_sort=timestamp&_order=desc`);
                    if (res.ok) {
                        conversionHistory = await res.json();
                        // Sync with local storage if server history is empty but local is not
                        if (conversionHistory.length === 0 && localHistory.length > 0) {
                            conversionHistory = localHistory;
                        }
                    } else {
                        conversionHistory = localHistory;
                    }
                } catch (error) {
                    console.error('Failed to fetch from server:', error);
                    conversionHistory = localHistory;
                }
            } else {
                conversionHistory = localHistory;
            }
            
            updateStats();
            renderHistory();
        }

        function updateStats() {
            const total = conversionHistory.length;
            const todayStart = new Date().setHours(0,0,0,0);
            const todayCount = conversionHistory.filter(item => new Date(item.timestamp) >= todayStart).length;
            
            const weekStart = new Date().setDate(new Date().getDate() - 7);
            const weekCount = conversionHistory.filter(item => new Date(item.timestamp) >= weekStart).length;
            
            const typeCounts = conversionHistory.reduce((acc, item) => {
                acc[item.type] = (acc[item.type] || 0) + 1;
                return acc;
            }, {});
            
            let favorite = '-';
            let maxCount = 0;
            for (const [type, count] of Object.entries(typeCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    favorite = type.charAt(0).toUpperCase() + type.slice(1);
                }
            }
            
            document.getElementById('totalConversions').textContent = total;
            document.getElementById('todayConversions').textContent = todayCount;
            document.getElementById('weekConversions').textContent = weekCount;
            document.getElementById('favoriteType').textContent = favorite;
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            const filteredHistory = currentFilter === 'all' 
                ? conversionHistory 
                : conversionHistory.filter(item => item.type === currentFilter);
            
            if (filteredHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>No conversions found</h3>
                        <p>${currentFilter === 'all' ? 'Start converting measurements to see your history here' : `No ${currentFilter} conversions found`}</p>
                    </div>
                `;
                return;
            }
            
            historyList.innerHTML = filteredHistory.map(item => `
                <div class="history-item">
                    <div class="history-content">
                        <div>
                            <span class="history-type ${item.type}">${item.type}</span>
                            <span class="badge badge-primary">${item.Operation || 'CONVERT'}</span>
                        </div>
                        <div class="history-conversion">
                            ${item.from} ${getOpSymbol(item.Operation)} ${item.to} = <strong>${item.result}</strong>
                        </div>
                        <div class="history-time">
                            ${new Date(item.timestamp).toLocaleString()}
                        </div>
                    </div>
                    <div class="history-actions">
                        <button class="action-btn" onclick="reuseConversion(${JSON.stringify(item).replace(/"/g, '&quot;')})" title="Reuse">🔄</button>
                        <button class="action-btn" onclick="deleteHistoryItem('${item.id}')" title="Delete">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function getOpSymbol(op) {
            const symbols = { CONVERT: '→', COMPARE: 'vs', ARITHMETIC: '+', ADD: '+', SUBTRACT: '-', DIVIDE: '÷' };
            return symbols[op] || '→';
        }

        function reuseConversion(item) {
            localStorage.setItem('reuseConversion', JSON.stringify(item));
            window.location.href = 'converter.html';
        }

        async function deleteHistoryItem(id) {
            const user = JSON.parse(localStorage.getItem('user'));
            
            if (user && !id.toString().startsWith('guest_')) {
                try {
                    await fetch(`${API_MEASUREMENTS}/${id}`, { method: 'DELETE' });
                } catch (error) {
                    console.error('Failed to delete from server:', error);
                }
            }
            
            conversionHistory = conversionHistory.filter(item => item.id != id);
            localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
            
            updateStats();
            renderHistory();
            showToast("Item deleted", "info");
        }

        async function clearHistory() {
            if (!confirm('Are you sure you want to clear your entire history?')) return;
            
            const user = JSON.parse(localStorage.getItem('user'));
            
            if (user) {
                try {
                    for (const item of conversionHistory) {
                        if (item.userId === user.id) {
                            await fetch(`${API_MEASUREMENTS}/${item.id}`, { method: 'DELETE' });
                        }
                    }
                } catch (error) {
                    console.error('Failed to clear from server:', error);
                }
            }
            
            conversionHistory = [];
            localStorage.removeItem('conversionHistory');
            
            updateStats();
            renderHistory();
            showToast("History cleared", "success");
        }

        // Event listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderHistory();
            });
        });

        // Initialize
        loadHistory();
    </script>
</body>
</html>
