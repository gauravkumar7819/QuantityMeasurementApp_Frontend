<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnitMaster - Professional Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar will be loaded by app.js -->
    <div id="navbar-container"></div>

    <header class="welcome-header">
        Welcome To Quantity Measurement
    </header>

    <main class="container">
        <!-- CHOOSE TYPE -->
        <section>
            <h2 class="section-title">Choose Type</h2>
            <div class="type-grid" id="typeGrid">
                <div class="type-card active" data-category="length">
                    <span class="type-icon">📏</span>
                    <span class="type-label">Length</span>
                </div>
                <div class="type-card" data-category="weight">
                    <span class="type-icon">⚖️</span>
                    <span class="type-label">Weight</span>
                </div>
                <div class="type-card" data-category="temperature">
                    <span class="type-icon">🌡️</span>
                    <span class="type-label">Temperature</span>
                </div>
                <div class="type-card" data-category="volume">
                    <span class="type-icon">🧪</span>
                    <span class="type-label">Volume</span>
                </div>
            </div>
        </section>

        <!-- CHOOSE ACTION -->
        <section>
            <h2 class="section-title">Choose Action</h2>
            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                <div class="action-selector">
                    <button class="action-btn active" data-action="COMPARE">Comparison</button>
                    <button class="action-btn" data-action="CONVERT">Conversion</button>
                    <button class="action-btn" data-action="ARITHMETIC">Arithmetic</button>
                </div>
                
                <div id="arithmeticOps" class="action-selector" style="display: none;">
                    <button class="action-btn active" data-arith-op="ADD">+</button>
                    <button class="action-btn" data-arith-op="SUBTRACT">-</button>
                    <button class="action-btn" data-arith-op="DIVIDE">÷</button>
                </div>
            </div>
        </section>

        <!-- INPUT AREA -->
        <section id="inputArea">
            <div class="flex-center gap-2">
                <!-- Value 1 Card -->
                <div class="value-card" style="flex: 1;">
                    <div class="value-label" id="label1">Value 1</div>
                    <input type="number" id="val1" class="large-input" value="1">
                    <div class="unit-select-wrapper">
                        <select id="unit1" class="unit-select"></select>
                    </div>
                </div>

                <!-- Operator / Arrow -->
                <div id="opIndicator" class="op-indicator">→</div>

                <!-- Value 2 Card -->
                <div class="value-card" style="flex: 1;" id="group2">
                    <div class="value-label" id="label2">Value 2</div>
                    <input type="number" id="val2" class="large-input" value="1">
                    <div class="unit-select-wrapper">
                        <select id="unit2" class="unit-select"></select>
                    </div>
                </div>
            </div>
        </section>

        <!-- RESULT AREA -->
        <section id="resultArea">
            <div class="result-card">
                <div>
                    <div class="value-label">Result</div>
                    <div id="resultValue" class="result-value-large">--</div>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <select id="resultUnit" class="unit-select" style="min-width: 120px;"></select>
                    <button id="saveBtn" class="action-btn" title="Save to History" style="padding: 0.5rem; width: auto;">💾</button>
                </div>
            </div>
            <div id="compareResult" class="compare-result" style="margin-top: 1.5rem; text-align: center;"></div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        const units = {
            length: {
                base: 'meter',
                data: {
                    meter: 1, kilometer: 0.001, centimeter: 100, millimeter: 1000,
                    mile: 0.000621371, yard: 1.09361, foot: 3.28084, inch: 39.3701
                }
            },
            weight: {
                base: 'kilogram',
                data: {
                    kilogram: 1, gram: 1000, milligram: 1000000,
                    pound: 2.20462, ounce: 35.274, ton: 0.001
                }
            },
            temperature: {
                base: 'celsius',
                isSpecial: true,
                conversions: {
                    celsius: { toBase: v => v, fromBase: v => v },
                    fahrenheit: { toBase: v => (v - 32) * 5/9, fromBase: v => (v * 9/5) + 32 },
                    kelvin: { toBase: v => v - 273.15, fromBase: v => v + 273.15 }
                }
            },
            volume: {
                base: 'liter',
                data: {
                    liter: 1, milliliter: 1000, gallon: 0.264172,
                    quart: 1.05669, cup: 4.22675, 'fluid ounce': 33.814
                }
            }
        };

        let currentCat = 'length';
        let currentAction = 'COMPARE';
        let currentArithOp = 'ADD';
        let currentResult = null;

        function init() {
            updateUnits();
            attachEvents();
            calculate();
        }

        function updateUnits() {
            const u1 = document.getElementById('unit1');
            const u2 = document.getElementById('unit2');
            const resU = document.getElementById('resultUnit');
            const catUnits = units[currentCat].isSpecial ? Object.keys(units[currentCat].conversions) : Object.keys(units[currentCat].data);
            
            const options = catUnits.map(u => `<option value="${u}">${u.charAt(0).toUpperCase() + u.slice(1)}</option>`).join('');
            u1.innerHTML = options;
            u2.innerHTML = options;
            resU.innerHTML = options;
            
            if (u2.options.length > 1) u2.selectedIndex = 1;
            resU.selectedIndex = 0;
        }

        function attachEvents() {
            // Type Selection
            document.querySelectorAll('.type-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    currentCat = card.dataset.category;
                    updateUnits();
                    calculate();
                });
            });

            // Action Selection
            document.querySelectorAll('[data-action]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-action]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentAction = btn.dataset.action;
                    updateUIForAction();
                    calculate();
                });
            });

            // Arithmetic Op Selection
            document.querySelectorAll('[data-arith-op]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-arith-op]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentArithOp = btn.dataset.arithOp;
                    updateUIForAction();
                    calculate();
                });
            });

            // Input changes
            ['val1', 'val2', 'unit1', 'unit2', 'resultUnit'].forEach(id => {
                document.getElementById(id).addEventListener('input', () => calculate());
            });

            document.getElementById('saveBtn').addEventListener('click', handleSave);
        }

        function updateUIForAction() {
            const l1 = document.getElementById('label1');
            const l2 = document.getElementById('label2');
            const ind = document.getElementById('opIndicator');
            const val2 = document.getElementById('val2');
            const arithOps = document.getElementById('arithmeticOps');

            arithOps.style.display = currentAction === 'ARITHMETIC' ? 'flex' : 'none';

            if (currentAction === 'COMPARE') {
                l1.textContent = 'FROM';
                l2.textContent = 'TO';
                ind.textContent = '→';
                val2.readOnly = false;
                val2.style.opacity = '1';
            } else if (currentAction === 'CONVERT') {
                l1.textContent = 'FROM';
                l2.textContent = 'TO';
                ind.textContent = '→';
                val2.readOnly = true;
                val2.style.opacity = '0.7';
            } else if (currentAction === 'ARITHMETIC') {
                l1.textContent = 'VALUE 1';
                l2.textContent = 'VALUE 2';
                const symbols = { ADD: '+', SUBTRACT: '-', DIVIDE: '÷' };
                ind.textContent = symbols[currentArithOp];
                val2.readOnly = false;
                val2.style.opacity = '1';
            }
        }

        function calculate() {
            const v1 = parseFloat(document.getElementById('val1').value) || 0;
            const v2Input = document.getElementById('val2');
            let v2 = parseFloat(v2Input.value) || 0;
            const u1 = document.getElementById('unit1').value;
            const u2 = document.getElementById('unit2').value;
            const resU = document.getElementById('resultUnit').value;
            const resVal = document.getElementById('resultValue');
            const compRes = document.getElementById('compareResult');

            const toBase = (val, unit) => {
                const cat = units[currentCat];
                if (cat.isSpecial) return cat.conversions[unit].toBase(val);
                return val / cat.data[unit];
            };

            const fromBase = (val, unit) => {
                const cat = units[currentCat];
                if (cat.isSpecial) return cat.conversions[unit].fromBase(val);
                return val * cat.data[unit];
            };

            const base1 = toBase(v1, u1);
            let displayResult = '';
            compRes.style.display = 'none';

            if (currentAction === 'CONVERT') {
                const result = fromBase(base1, u2);
                v2Input.value = result.toFixed(3).replace(/\.?0+$/, '');
                const finalRes = fromBase(base1, resU);
                displayResult = finalRes.toFixed(3).replace(/\.?0+$/, '');
            } else if (currentAction === 'COMPARE') {
                const base2 = toBase(v2, u2);
                const diff = Math.abs(base1 - base2);
                compRes.style.display = 'block';
                if (diff < 0.000001) {
                    compRes.textContent = 'Quantities are Equal';
                    compRes.className = 'compare-result compare-equal';
                } else {
                    compRes.textContent = base1 > base2 ? 'Value 1 is larger' : 'Value 2 is larger';
                    compRes.className = 'compare-result compare-notequal';
                }
                const finalRes = fromBase(base1, resU);
                displayResult = finalRes.toFixed(3).replace(/\.?0+$/, '');
            } else if (currentAction === 'ARITHMETIC') {
                const base2 = toBase(v2, u2);
                let resultBase;
                switch(currentArithOp) {
                    case 'ADD': resultBase = base1 + base2; break;
                    case 'SUBTRACT': resultBase = base1 - base2; break;
                    case 'MULTIPLY': resultBase = base1 * v2; break; // Multiplying quantity by scalar
                    case 'DIVIDE': resultBase = v2 !== 0 ? base1 / v2 : 0; break; // Dividing quantity by scalar
                    default: resultBase = base1 + base2;
                }
                const finalRes = fromBase(resultBase, resU);
                displayResult = finalRes.toFixed(3).replace(/\.?0+$/, '');
            }

            resVal.textContent = displayResult;
            
            currentResult = {
                type: currentCat,
                from: `${v1} ${u1}`,
                to: currentAction === 'CONVERT' ? `to ${u2}` : `${v2} ${u2}`,
                result: `${displayResult} ${resU}`,
                op: currentAction === 'ARITHMETIC' ? currentArithOp : currentAction
            };
        }

        async function handleSave() {
            if (!currentResult) return;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const historyItem = {
                    ...currentResult,
                    timestamp: new Date().toISOString(),
                    userId: user ? user.id : 'guest',
                    Operation: currentResult.op
                };

                const localHistory = JSON.parse(localStorage.getItem('conversionHistory') || '[]');
                localHistory.unshift(historyItem);
                localStorage.setItem('conversionHistory', JSON.stringify(localHistory.slice(0, 50)));

                if (user && typeof API_MEASUREMENTS !== 'undefined') {
                    await fetch(API_MEASUREMENTS, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(historyItem)
                    });
                }
                showToast("Saved to history", "success");
            } catch (e) {
                console.error(e);
            } finally {
                saveBtn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
